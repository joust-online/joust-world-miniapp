[profile.default]
src = "src"
out = "out"
fallback_oz = true
viaIR = true
optimization = true
optimizerRuns = 10000
libs = ["lib", "dependencies"]

[dependencies]
forge-std = "1.9.7"
solmate = "6.8.0"
"@openzeppelin-contracts-upgradeable" = "5.3.0"
"@openzeppelin-contracts" = "5.3.0"
solady = "0.1.19"

[rpc_endpoints]
world-chain = "${WORLD_CHAIN_RPC}"

[etherscan]
worldchain = { chain = "480", url = "https://worldchain-mainnet.explorer.alchemy.com/api", key = "${ETHERSCAN_API_KEY}" }
